<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammad Fakhri — Public Notebook</title>
    
    <!-- Modern Geometric Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* --- Design System (Vercel / Linear Aesthetic) --- */
        :root {
            --bg-main: #FAFAFA;       
            --bg-surface: #FFFFFF;    
            --text-primary: #111111;  
            --text-secondary: #4B5563;
            --border-color: #E5E7EB;  
            --accent: #0066CC;   
            --radius: 12px;           
            --font-main: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            --max-width: 720px;       
            --space-section: 96px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 24px;
            min-height: 100vh;
        }

        header, main, footer {
            width: 100%;
            max-width: var(--max-width);
        }

        /* --- Header & Nav --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 48px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 48px;
        }

        .logo a {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
        }

        nav { display: flex; gap: 24px; }
        
        nav a {
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.15s ease;
        }
        
        nav a:hover, nav a.active { color: var(--text-primary); }

        /* --- Global Structural Styles --- */
        section { margin-bottom: var(--space-section); }
        
        .section-title {
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        /* --- Hero --- */
        .hero h1 {
            font-size: 34px;
            font-weight: 400;
            line-height: 1.3;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
        }
        .hero p {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 32px;
            max-width: 600px;
        }

        /* --- Grid Layouts (About, Projects) --- */
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        
        .list-col h3 { font-size: 14px; font-weight: 500; margin-bottom: 16px; }
        .list-col ul { list-style: none; }
        .list-col li { font-size: 14px; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.5; }

        /* --- Cards (Projects) --- */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            transition: border-color 0.2s ease;
        }
        .card:hover { border-color: var(--text-secondary); }
        .card h3 { font-size: 15px; color: var(--text-primary); margin-bottom: 8px; }
        .card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: auto; }
        .tag { font-size: 12px; color: var(--text-secondary); background: var(--bg-main); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-color); }

        /* --- Lists (Timeline, Writing, Books) --- */
        .timeline-item, .list-item {
            display: flex;
            margin-bottom: 24px;
            align-items: baseline;
        }
        .timeline-item .year { width: 80px; font-size: 14px; font-weight: 500; color: var(--text-primary); flex-shrink: 0; }
        .timeline-item .event { font-size: 14px; color: var(--text-secondary); }
        
        .article-link {
            display: flex;
            justify-content: space-between;
            text-decoration: none;
            padding: 12px 0;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }
        .article-link:hover { border-color: var(--border-color); }
        .article-link .title { font-size: 15px; color: var(--text-primary); }
        .article-link .meta { font-size: 14px; color: var(--text-secondary); }

        /* --- Markdown Article Renderer --- */
        .article-header { margin-bottom: 48px; }
        .article-header h1 { font-size: 32px; font-weight: 500; margin-bottom: 16px; letter-spacing: -0.02em; }
        .article-header .meta { font-size: 14px; color: var(--text-secondary); display: flex; gap: 16px; }
        
        .markdown-body { font-size: 16px; line-height: 1.7; color: var(--text-primary); }
        .markdown-body p { margin-bottom: 24px; color: var(--text-secondary); }
        .markdown-body h2 { font-size: 20px; font-weight: 500; margin: 40px 0 16px 0; }
        .markdown-body a { color: var(--accent); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body blockquote { border-left: 2px solid var(--border-color); padding-left: 16px; font-style: italic; color: var(--text-secondary); margin-bottom: 24px; }
        .markdown-body ul { margin-bottom: 24px; padding-left: 20px; color: var(--text-secondary); }
        .markdown-body li { margin-bottom: 8px; }

        /* --- Footer --- */
        footer {
            margin-top: auto;
            padding: 48px 0;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* --- Responsive --- */
        @media (max-width: 640px) {
            header { flex-direction: column; align-items: flex-start; gap: 24px; padding: 32px 0; }
            nav { flex-wrap: wrap; gap: 16px; }
            .grid-3, .grid-2 { grid-template-columns: 1fr; gap: 24px; }
            .timeline-item { flex-direction: column; gap: 8px; }
            .article-link { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="#/">Mohammad Fakhri</a></div>
        <nav>
            <a href="#/" class="nav-link">About</a>
            <a href="#/projects" class="nav-link">Projects</a>
            <a href="#/blog" class="nav-link">Writing</a>
            <a href="#/now" class="nav-link">Now</a>
        </nav>
    </header>

    <main id="app-root">
        <!-- JS INJECTS RENDERED PAGES HERE -->
    </main>

    <footer>
        <div>Made with curiosity.</div>
        <div>Content written in Markdown. Pure JS.</div>
    </footer>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
